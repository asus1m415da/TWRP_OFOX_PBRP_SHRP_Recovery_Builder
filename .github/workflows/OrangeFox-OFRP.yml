name: OrangeFox Recovery Builder - Samsung A06 PRO

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'Rama del Manifiesto (ej: 12.1)'
        required: true
        default: '12.1'
      DEVICE_TREE_URL:
        description: 'URL del Device Tree (el de tu amigo)'
        required: true
        default: 'https://github.com/asus1m415da/android_device_samsung_a06_fox'
      DEVICE_TREE_BRANCH:
        description: 'Rama del Device Tree'
        required: true
        default: 'fox_12.1'
      DEVICE_PATH:
        description: 'Ruta del dispositivo'
        required: true
        default: 'device/samsung/a06'
      DEVICE_NAME:
        description: 'Codename del dispositivo'
        required: true
        default: 'a06'
      VENDOR_TREE_URL:
        description: 'URL de TU Vendor Tree (Blobs de Eduardo)'
        required: true
        default: 'https://github.com/asus1m415da/android_vendor_samsung_a06'
      VENDOR_PATH:
        description: 'Ruta del Vendor'
        required: true
        default: 'vendor/samsung/a06'
      BUILD_TARGET:
        description: 'Objetivo de compilación'
        required: true
        default: 'recovery'
        type: choice
        options:
        - recovery
        - boot
        - vendorboot

jobs:
  build:
    name: Compilando para ${{ github.event.inputs.DEVICE_NAME }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ORANGEFOX_ROOT: ${{ github.workspace }}/OrangeFox

    steps:
    - name: Checkout del Repositorio
      uses: actions/checkout@v4

    - name: Maximizar Espacio (SlimHub) 🧹
      uses: rokibhasansagar/slimhub_actions@main

    - name: Configurar Swap de 12GB ⚡
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Instalar Herramientas de Compilación 🛠️
      run: |
        sudo apt update
        sudo apt install aria2 -y
        git clone https://gitlab.com/OrangeFox/misc/scripts.git
        cd scripts
        sudo bash setup/android_build_env.sh

    - name: Sincronizar Fuentes de OrangeFox 🔄
      run: |
        mkdir -p ${ORANGEFOX_ROOT}
        cd ${ORANGEFOX_ROOT}
        git config --global user.name "asus1m415da"
        git config --global user.email "eduardo@example.com"
        git clone https://gitlab.com/OrangeFox/sync.git -b master
        cd sync
        ./orangefox_sync.sh --branch ${{ github.event.inputs.MANIFEST_BRANCH }} --path ${ORANGEFOX_ROOT}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}

    - name: Clonar Árboles (Device & Vendor) 💎
      run: |
        cd ${ORANGEFOX_ROOT}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        # Clonar Device Tree
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.DEVICE_PATH }}
        # Clonar TU Vendor Tree (Los 1.1GB de One UI 7)
        git clone ${{ github.event.inputs.VENDOR_TREE_URL }} -b main ./${{ github.event.inputs.VENDOR_PATH }}

    - name: Sanitizar Archivos (Matar errores de Windows) 🧼
      run: |
        cd ${ORANGEFOX_ROOT}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        # Borramos finales de línea incorrectos (\r)
        find ${{ github.event.inputs.DEVICE_PATH }} -type f \( -name "*.sh" -o -name "*.mk" \) -exec sed -i 's/\r$//' {} + || true
        find ${{ github.event.inputs.VENDOR_PATH }} -type f \( -name "*.sh" -o -name "*.mk" \) -exec sed -i 's/\r$//' {} + || true
        chmod +x ${{ github.event.inputs.DEVICE_PATH }}/vendorsetup.sh || true

    - name: Iniciar Compilación 🏗️
      run: |
        cd ${ORANGEFOX_ROOT}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        
        # TRUCO MAESTRO: Apagamos el modo estricto de GitHub antes de cargar el entorno
        set +e
        source build/envsetup.sh
        
        # Volvemos a encenderlo para atrapar errores reales
        set -e
        
        export ALLOW_MISSING_DEPENDENCIES=true
        export FOX_USE_TWRP_RECOVERY_IMAGE_BUILDER=1
        export LC_ALL=C
        
        # Intentamos con twrp_ o con omni_
        lunch twrp_${{ github.event.inputs.DEVICE_NAME }}-eng || lunch omni_${{ github.event.inputs.DEVICE_NAME }}-eng
        
        # ¡A cocinar!
        mka adbd ${{ github.event.inputs.BUILD_TARGET }}image

    - name: Verificar y Preparar Entrega 📦
      if: always()
      run: |
        OUT_DIR=${ORANGEFOX_ROOT}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
        echo "IMG_FILE=$(find $OUT_DIR -name 'OrangeFox*.img' | head -n 1)" >> $GITHUB_ENV
        echo "ZIP_FILE=$(find $OUT_DIR -name 'OrangeFox*.zip' | head -n 1)" >> $GITHUB_ENV

    - name: Publicar Release en GitHub 🚀
      uses: softprops/action-gh-release@v2
      if: env.IMG_FILE != ''
      with:
        files: |
          ${{ env.IMG_FILE }}
          ${{ env.ZIP_FILE }}
        name: OrangeFox Samsung A06 - Eduardo Gabriel (${{ env.BUILD_DATE }})
        tag_name: ofox-${{ env.BUILD_DATE }}-${{ github.run_id }}
        body: |
          Compilación exitosa para Samsung Galaxy A06.
          - **Lead Maintainer:** asus1m415da
          - **Blobs Originales:** One UI 7 (Android 15)
          - **Táctil:** Drivers Focaltech integrados desde Vendor Tree.
